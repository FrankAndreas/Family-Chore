services:
  db:
    image: postgres:15-alpine
    container_name: chorespec-postgres
    restart: always
    environment:
      POSTGRES_USER: chorespec_admin
      POSTGRES_PASSWORD: chorespec_password
      POSTGRES_DB: chorespec
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # Use image from GitHub Container Registry

    image: ghcr.io/frankandreas/family-chore-backend:latest
    container_name: chorespec-backend
    volumes:
      - chores_data:/app/data
      - chores_uploads:/app/uploads
      - chores_backups:/app/backups
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://chorespec_admin:chorespec_password@db:5432/chorespec
      # Legacy SQLite fallback: - DATABASE_URL=sqlite:///./data/chorespec.db
      # --- Production Secrets (uncomment and set for deployment) ---
      # - JWT_SECRET_KEY=<generate-a-64-char-hex-string>
      # - VAPID_PRIVATE_KEY=<path-or-pem-content>
      # - VAPID_PUBLIC_KEY=<application-server-key>
      # - VAPID_CLAIMS_EMAIL=mailto:your@email.com
      # - SMTP_SERVER=smtp.example.com
      # - SMTP_PORT=587
      # - SMTP_USERNAME=your-username
      # - SMTP_PASSWORD=your-password
      # - CORS_ORIGINS=https://your-domain.com
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000\")' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # Use image from GitHub Container Registry

    image: ghcr.io/frankandreas/family-chore-frontend:latest
    container_name: chorespec-frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  chores_data:
  chores_uploads:
  chores_backups:
